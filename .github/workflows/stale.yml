name: 'Close stale PRs'
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-pr-message: 'This PR has been automatically marked as stale because it has not had recent activity. It will be closed in 7 days if no further activity occurs.'
          close-pr-message: 'This PR was automatically closed because it has been stale for 14 days. Feel free to reopen if still needed.'
          days-before-pr-stale: 7
          days-before-pr-close: 7
          stale-pr-label: 'stale'
          exempt-pr-labels: 'pinned,security,P0'
          days-before-issue-stale: -1
          days-before-issue-close: -1
