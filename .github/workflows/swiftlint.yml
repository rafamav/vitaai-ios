name: SwiftLint

on:
  pull_request:
    branches: [main, develop]
    paths:
      - '**/*.swift'
      - '.swiftlint.yml'
  push:
    branches: [main]
    paths:
      - '**/*.swift'
      - '.swiftlint.yml'

jobs:
  swiftlint:
    name: SwiftLint
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: |
          swiftlint lint \
            --strict \
            --reporter github-actions-logging
