name: Deploy TestFlight

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
      
      - run: gem install fastlane -NV
      - run: brew install xcodegen
      
      - run: |
          cat > .env << EOF
          APPLE_ID=${{ secrets.APPLE_ID }}
          TEAM_ID=${{ secrets.TEAM_ID }}
          MATCH_PASSWORD=${{ secrets.MATCH_PASSWORD }}
          MATCH_KEYCHAIN_PASSWORD=${{ secrets.MATCH_KEYCHAIN_PASSWORD }}
          ASC_KEY_ID=${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID=${{ secrets.ASC_ISSUER_ID }}
          EOF

      - run: |
          mkdir -p ./fastlane/keys
          echo '${{ secrets.ASC_KEY_CONTENT }}' > ./fastlane/keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

      - run: |
          security create-keychain -p "${{ secrets.MATCH_KEYCHAIN_PASSWORD }}" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "${{ secrets.MATCH_KEYCHAIN_PASSWORD }}" build.keychain

      - run: xcodegen generate

      - run: fastlane beta
