name: Deploy TestFlight

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.1.app/Contents/Developer

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
      
      - run: gem install fastlane -NV
      - run: brew install xcodegen
      
      - run: |
          cat > .env << EOF
          APPLE_ID=${{ secrets.APPLE_ID }}
          TEAM_ID=${{ secrets.TEAM_ID }}
          MATCH_PASSWORD=${{ secrets.MATCH_PASSWORD }}
          MATCH_KEYCHAIN_PASSWORD=${{ secrets.MATCH_KEYCHAIN_PASSWORD }}
          ASC_KEY_ID=${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID=${{ secrets.ASC_ISSUER_ID }}
          EOF

      - run: |
          mkdir -p ./fastlane/keys
          echo '${{ secrets.ASC_KEY_CONTENT }}' > ./fastlane/keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

      - name: Setup Keychain (fix codesign hang)
        run: |
          # Delete keychain if exists
          security delete-keychain build.keychain-db || true

          # Create with PASSWORD (needed for partition list)
          security create-keychain -p "${{ secrets.MATCH_KEYCHAIN_PASSWORD }}" build.keychain-db

          # Unlock permanently (no timeout)
          security unlock-keychain -p "${{ secrets.MATCH_KEYCHAIN_PASSWORD }}" build.keychain-db
          security set-keychain-settings build.keychain-db

          # Set as default
          security list-keychains -d user -s build.keychain-db
          security default-keychain -s build.keychain-db

          # Note: partition list will be set by fastlane match when it imports certs

      - run: xcodegen generate

      - name: Configure Git credentials for Match
        run: |
          git config --global credential.helper store
          echo "https://rafamav:${{ secrets.GIT_PAT }}@github.com" > ~/.git-credentials

      - run: fastlane beta
