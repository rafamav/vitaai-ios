      tags: [user]
      operationId: getUserQuota
      summary: Quota e uso do plano corrente — storage, transcrição (minutos), audio max
      description: |
        Retorna usado vs limite por categoria. Plumb com `storageBytesUsed` +
        `transcriptionMinutesUsedPeriod` em `user_profiles`, atualizados via
        hooks de upload R2 e transcribe-complete. Reset mensal automático via
        cron quando `quotaPeriodEnd` passa.
      security: [{ sessionCookie: [] }]
      responses:
        '200':
          description: Quota do plano corrente
          content:
            application/json:
              schema:
                type: object
                required: [plan, planLabel, storage, transcription, audioMaxDurationSeconds, subscription]
                properties:
                  plan:
                    type: string
                    enum: [free, trial, pro, premium]
                    description: Valor real do DB (legado free/trial/pro/premium)
                  planLabel:
                    type: string
                    description: Rótulo de produto (Free, Plus, Premium)
                  storage:
                    type: object
                    required: [usedBytes, limitBytes]
                    properties:
                      usedBytes: { type: integer, format: int64 }
                      limitBytes: { type: integer, format: int64 }
                  transcription:
                    type: object
                    required: [usedMinutesThisPeriod, limitMinutesPerPeriod]
                    properties:
                      usedMinutesThisPeriod: { type: integer }
                      limitMinutesPerPeriod: { type: integer }
                      periodStart: { type: string, format: date-time, nullable: true }
                      periodEnd: { type: string, format: date-time, nullable: true }
                  audioMaxDurationSeconds:
                    type: integer
                    description: Limite de duração por arquivo (5h em planos pagos, 0 em free)
                  subscription:
                    type: object
                    properties:
                      stripeSubscriptionId: { type: string, nullable: true }
                      stripeCurrentPeriodEnd: { type: string, format: date-time, nullable: true }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

