            $ref: '#/components/schemas/DashboardSubject'
        agenda:
          type: array
          items:
            $ref: '#/components/schemas/DashboardAgendaItem'
        flashcardsDueTotal:
          type: integer
        xp:
          type: object
          properties:
            total:
              type: integer
            level:
              type: integer

    DashboardHeroCard:
      type: object
      required: [type, label, labelTone, title, subtitle, pills, cta, action, urgency, backgroundImage]
      properties:
        type:
          type: string
          enum: [exam, revision, streak, grade_alert, deadline]
          description: |
            Semantic type for analytics and routing. DO NOT use in client to decide
            label/cta/background — those come from their own fields. Clients should
            only branch on `type` for routing (e.g. grade_alert opens disciplineDetail).
        label:
          type: string
          description: |
            Short uppercase label rendered above the title (e.g. "PROVA",
            "RISCO DE REPROVAR"). Fully server-driven so clients don't duplicate copy.
        labelTone:
          type: string
          enum: [danger, warning, info, accent, neutral]
          description: |
            Semantic tone for the label color. Clients map this to their own
            design tokens (VitaColors on iOS, Compose colors on Android). Never
            send raw hex from backend — backend speaks semantics, clients speak pixels.
        title:
          type: string
        subtitle:
          type: string
        pills:
          type: array
          items:
            type: object
            properties:
              icon:
                type: string
              text:
                type: string
        action:
          type: object
          properties:
            type:
              type: string
            target:
              type: string
            id:
              type: string
              nullable: true
        urgency:
          type: integer
          description: 0-100, higher = more urgent
        cta:
          $ref: '#/components/schemas/DashboardHeroCardCta'
        backgroundImage:
          $ref: '#/components/schemas/DashboardHeroCardBackground'
        gradeAlertMeta:
          $ref: '#/components/schemas/GradeAlertMeta'
          nullable: true
          description: |
            Only present when type=grade_alert. Exposes the weighted grade-risk
            model so clients can show the "why" and Vita (coach IA) can reason
            without confusing absolute scores with weighted performance.

    GradeAlertMeta:
      type: object
      description: |
        Weighted grade-risk metadata. The backend groups all graded evaluations
        of a subject, computes pointsEarned = sum(score * weight) against
        totalWeight=10 (ULBRA standard), and classifies into one of 3 categories
        to avoid false positives like "Nota 1.1" when the evaluation weight is 2
        (which is actually 55%, not a failing grade).

        Categories:
        - risco_reprovacao: max possible final grade < passingGrade (math-impossible to pass)
        - alerta_projecao:  student needs score > passingGrade on remaining evals AND assessed weight >= 30%
        - nota_fraca_isolada: one evaluation < 30% of its own weight, subject still recoverable

        Gate: the backend NEVER emits alerta_projecao when assessed weight < 30%
        of total weight (too early in the semester to alert).
      required:
        - riskCategory
        - pointsEarned
        - pointsRemaining
        - assessedWeight
        - totalWeight
      properties:
        riskCategory:
          type: string
          enum: [risco_reprovacao, alerta_projecao, nota_fraca_isolada]
          description: Which of the 3 categories triggered this alert
        scorePercent:
          type: integer
          nullable: true
          description: |
            % of max achieved on the triggering evaluation (score/weight*100).
            Only set when a single isolated eval triggered the alert.
        projectedAvg:
          type: number
          nullable: true
          description: |
            Projected final average assuming student scores exactly passingGrade
            on remaining evaluations. Neutral projection, not pessimistic.
        pointsEarned:
          type: number
          description: Sum of (score * weight) across all graded evaluations of this subject
        pointsRemaining:
          type: number
          description: Weight of evaluations still to be taken (totalWeight - assessedWeight)
        minNeeded:
          type: number
          nullable: true
          description: |
            Minimum average needed on remaining evaluations to reach passingGrade.
            Null when there are no remaining evaluations.
        assessedWeight:
          type: number
          description: Sum of weights of evaluations already graded (0-10)
        totalWeight:
          type: number
          description: Total weight of all evaluations for the subject (ULBRA default = 10)

    DashboardHeroCardCta:
      type: object
      required: [text]
      properties:
        text:
          type: string
          description: CTA button copy (e.g. "Estudar agora", "Revisar flashcards")
        icon:
          type: string
          nullable: true
          description: Optional SF Symbol / Material icon name

    DashboardHeroCardBackground:
      type: object
      required: [asset]
      properties:
        asset:
          type: string
          description: |
            Asset name (convention shared by iOS and Android asset catalogs).
            Backend picks based on subject/type. Clients fall back to a default
            if the asset is missing locally.

    DashboardSubject:
      type: object
      properties:
        name:
          type: string
        shortName:
          type: string
        difficulty:
          type: string
          nullable: true
        vitaScore:
          type: number
          nullable: true
          description: 0-100 mastery score
        vitaTier:
          type: string
          nullable: true
          description: "tier label: bronze, silver, gold, diamond"

    DashboardAgendaItem:
      type: object
      properties:
        type:
          type: string
        title:
          type: string
        daysUntil:
          type: integer
        date:
          type: string

    # ═══ Server-Driven UI ═══

    ScreenResponse:
      type: object
      required: [screenId, sections]
      properties:
        screenId:
          type: string
        sections:
          type: array
          items:
            $ref: '#/components/schemas/ScreenSection'

    ScreenSection:
      type: object
      required: [type, props]
      properties:
        type:
          type: string
          enum:
            - hero-carousel
            - hero-stat
            - section-label
            - tools-grid
            - subject-scroll
            - stat-grid
            - stat-row
            - glass-card
            - agenda-list
            - deck-list
            - row-list
            - leaderboard
            - heatmap
            - bar-chart
            - progress-ring
            - empty-state
            - action-button
        props:
          type: object
          additionalProperties: true

    ScreenAction:
      type: object
      properties:
        type:
          type: string
          enum: [navigate, sheet, link]
        target:
          type: string
        screenId:
          type: string
        id:
          type: string
        url:
          type: string

  responses:
    Unauthorized:
      description: Not authenticated
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    PlanLimit:
      description: Plan limit reached - upgrade required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/PlanLimitError'
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

paths:
  # ════════════════════════════════════════
  # AUTH
  # ════════════════════════════════════════
  /api/auth/mobile-start:
    get:
      tags: [auth]
      operationId: mobileAuthStart
      summary: Start mobile OAuth flow
      security: []
      parameters:
        - name: provider
          in: query
          schema:
            type: string
            default: google
        - name: callbackURL
          in: query
          schema:
            type: string
      responses:
        '302':
          description: Redirect to OAuth provider

  /api/auth/mobile-callback:
    get:
      tags: [auth]
      operationId: mobileAuthCallback
      summary: OAuth callback - redirects to app deep link
      security: []
      responses:
        '302':
          description: Redirect to vitaai://auth/callback with token, name, email, image, or error query params

  /api/auth/mobile-apple:
    post:
      tags: [auth]
      operationId: mobileAppleAuth
      summary: Sign in with Apple identity token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                identityToken:
                  type: string
                fullName:
                  type: string
                  nullable: true
                email:
                  type: string
                  nullable: true
                nonce:
                  type: string
                  nullable: true
              required: [identityToken]
      responses:
        '200':
          description: Apple auth successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthToken'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/auth/{path}:
    get:
      tags: [auth]
      operationId: betterAuthCatchAllGet
      summary: better-auth catch-all (GET)
      security: []
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Varies by better-auth sub-route
    post:
      tags: [auth]
      operationId: betterAuthCatchAllPost
      summary: better-auth catch-all (POST)
      security: []
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Varies by better-auth sub-route

  # ════════════════════════════════════════
  # INTERNAL / CRON
  # ════════════════════════════════════════

  /api/cron/portal-sync:
    get:
      tags: [internal]
      operationId: cronPortalSync
      summary: Periodic portal sync worker (keep-alive + full re-sync, logs to sync_logs)
      description: Protected by CRON_SECRET bearer token. Not for client use. Writes audit trail to vita.sync_logs.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Sync results
          content:
            application/json:
              schema:
                type: object
                properties:
                  processed:
                    type: integer
                  results:
                    type: array
                    items:
                      type: object
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/cron/notifications:
    get:
      tags: [internal]
      operationId: cronNotifications
      summary: Daily notification worker - exam alerts, flashcard reminders, grade alerts
      description: |
        Protected by CRON_SECRET bearer token. Not for client use.
        Checks all users for upcoming exams (7/3/1 day alerts), flashcards due,
        and low grades needing recovery. Idempotent via deterministic notification IDs.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Notification results
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  sent:
                    type: integer
                  users:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/portal/force-sync:
    post:
      tags: [internal]
      operationId: portalForceSync
      summary: Force Canvas re-sync with API token
      description: Protected by CRON_SECRET. Accepts a Canvas Personal Access Token to re-scrape and ingest data.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                connectionId:
                  type: string
                  nullable: true
                token:
                  type: string
              required: [token]
      responses:
        '200':
          description: Sync results
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  scrape:
                    type: object
                  ingest:
                    type: object
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/mcp:
    post:
      tags: [internal]
      operationId: mcpEndpoint
      summary: MCP (Model Context Protocol) endpoint for AI agents
      description: Internal MCP server endpoint for AI agent tools. Not for client use.
      responses:
        '200':
          description: MCP response

  # ════════════════════════════════════════
  # PORTAL
  # ════════════════════════════════════════
  /api/portal/filter-files:
    post:
      tags: [portal]
      operationId: portalFilterFiles
      summary: LLM-based file filter — classify which files are planos de ensino
      security:
        - cookieAuth: []
        - extensionToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                files:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                      displayName:
                        type: string
                      contentType:
                        type: string
                      size:
                        type: integer
                    required: [id, displayName]
              required: [files]
      responses:
        '200':
          description: Filtered file IDs
          content:
            application/json:
              schema:
                type: object
                properties:
                  relevantFileIds:
                    type: array
                    items:
                      type: string
                  fallback:
                    type: boolean
                    description: True if regex fallback was used (LLM unavailable)
        '401':
          $ref: '#/components/responses/Unauthorized'

  # /api/canvas/status — REMOVED. Use /api/portal/status instead.

  /api/portal/status:
    get:
      tags: [portal]
      operationId: portalStatus
      summary: Get portal connection status
      security:
        - cookieAuth: []
        - extensionToken: []
      responses:
        '200':
          description: Connection status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortalStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/portal/connect:
    post:
      tags: [portal]
      operationId: portalConnect
      summary: Connect to academic portal via session cookie
      security:
        - cookieAuth: []
        - extensionToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sessionCookie:
                  type: string
                instanceUrl:
                  type: string
                syncId:
                  type: string
                  nullable: true
                portalName:
                  type: string
                  nullable: true
              required: [sessionCookie, instanceUrl]
      responses:
        '200':
          description: Connection initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  syncId:
                    type: string
                  portalType:
                    type: string
                  grades:
                    type: integer
                  schedule:
                    type: integer
                  pagesDiscovered:
                    type: integer
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/portal/ingest:
    post:
      tags: [portal]
      operationId: portalIngest
      summary: Ingest data from Canvas or WebAluno portal (warns on missing cookies)
      # 2026-04-09: internal phantom table cleanup (no API surface changes)
  # 2026-04-09: cron-to-ingest auth fix (internal, no API surface changes)
  # 2026-04-09: portal extraction uses vLLM direct, chat includes portal data (no API surface changes)
      description: |
        Accepts polymorphic payload: Canvas format (with courses, assignments, files, calendarEvents)
        or WebAluno format (with grades, curriculum, schedule, frequency).
      security:
        - cookieAuth: []
        - extensionToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/CanvasIngestPayload'
