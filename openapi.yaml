      operationId: exportUserData
      summary: Portabilidade LGPD art. 18 V — export JSON de todos os dados do usuário
      description: |
        Retorna JSON estruturado com TUDO que o usuário produziu no VitaAI:
        perfil, academic (subjects/evaluations/schedule/calendar/grades),
        portal (connections sem sessionCookie), study (plans, decks,
        flashCards, notes), documents, studio (sources/outputs),
        simulados, qbank (sessions/answers/lists), osce, chat, badges,
        activity. Dados globais (catálogo QBank, disciplinas canônicas)
        NÃO entram. Bytes de arquivos referenciados por metadata.
        SLA pequeno porte (Res. CD/ANPD 2/2022 art. 7): 30 dias.
      responses:
        '200':
          description: JSON attachment com todos os dados do usuário
          content:
            application/json:
              schema:
                type: object
                properties:
                  exportedAt: { type: string, format: date-time }
                  schemaVersion: { type: string }
                  user: { type: object }
                  academic: { type: object }
                  portal: { type: object }
                  study: { type: object }
                  documents: { type: array, items: { type: object } }
                  studio: { type: object }
                  simulados: { type: object }
                  qbank: { type: object }
                  osce: { type: object }
                  chat: { type: object }
                  gamification: { type: object }
                  activity: { type: array, items: { type: object } }
        '401':
