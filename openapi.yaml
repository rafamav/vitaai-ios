      summary: Aggregate stats + markdown mindmap of VitaAI (gold standard)
      description: |
        Returns JSON { markdown, stats, timestamp } consumed by /vitaai-mindmap.html
        servido pelo container `mindmap-server` em monstro
        (http://monstro.tail7e98e6.ts.net:8888). Renderizado por markmap.

        Seções: Plataforma + Mapa da API · Banco de Dados · Disciplinas Catálogo ·
        Universidades · Mapeamento Universidade→Disciplina · Usuários (full detalhe
        por user) · Acadêmico agregado · Portal Coverage (categorias LMS/INSTITUCIONAL/
        AUXILIAR, cobertura LMS+Inst, distribuição, top mix, por estado, fingerprints) ·
        LGPD & Compliance (BYMAV LTDA + audio consent + retenção + telemetria) ·
        MCP Servers (vita-brain admin, vita-user gold, vita-catalog público) ·
        QBank · Simulados · Flashcards · VITA Coach · Studio/RAG · Notificações ·
        Atividades · Integrações · Custo LLM 7d · Infra (postgres + uptime + memory).

