# Last implementation sync: 2026-04-18 (Phase 0 disciplines unification; no API surface change)
openapi: 3.1.0
info:
  title: Vita AI API
  version: 1.0.9
  # 2026-04-09: internal phantom table cleanup (no API surface changes)
  # 2026-04-09: cron-to-ingest auth fix (internal, no API surface changes)
  # 2026-04-09: portal extraction uses vLLM direct, chat includes portal data (no API surface changes)
  # 2026-04-18: flash_cards.disciplineId now text UUID (schema drift fix matching live DB); no API surface change
  # 2026-04-20: Haiku plano-de-ensino extract via CLAUDE_CODE_OAUTH_TOKEN (no more x-api-key); no API surface change
  # 2026-04-27: portal notifications refactor — sendNotification unified dispatch + portal source/metadata in Notification schema (additive, no breaking change)
  # 2026-04-20: subject UPDATE via Drizzle native (raw SQL was silently failing on escape of long syllabus strings); no API surface change
  # 2026-04-24: Layer 4 LLM Judge fire-and-forget after audit (issue #170); no API surface change
  # 2026-04-20: cron-drives-Haiku — PDFs recém-baixados pro R2 disparam Haiku server-side (plano extract sem iOS inline)
  # 2026-04-20: cron-haiku-backfill — varredura retroativa de planos já em R2 sem extraction (sem precisar download novo)
  # 2026-04-20: multi-format support — downloader fetches docx/xlsx/pptx to R2, backfill uses mammoth/xlsx parsers
  # 2026-04-20: Canvas module items scraping — files inside modules now discovered
  # 2026-04-21: LLM extraction now emits canonical 'kind' enum per evaluation (parcial|semestral|trabalho|seminario|simulado|outro) — no API surface changes, internal Camada 2 normalization
  description: |
    Source-of-truth API specification for Vita AI across all platforms (Android, iOS, Web).
    Covers authentication, study tools, QBank, AI coaching, portal connectors, and more. Last updated: 2026-04-08.
  contact:
    name: BYMAV
    email: rafamav@pixio.cloud

servers:
  - url: https://app.vita-ai.cloud
    description: Production
  - url: http://localhost:3000
    description: Local development

tags:
  - name: auth
    description: Authentication (better-auth + mobile flows)
  - name: portal
    description: Unified academic portal connectors (Canvas, WebAluno)
  - name: study
    description: Study tools - flashcards, mindmaps, sessions, exams, transcription
  - name: qbank
    description: Question bank - questions, sessions, progress
  - name: simulados
    description: Mock exams / simulated tests
  - name: ai
    description: AI coach, OSCE, transcription
  - name: vita
    description: Vita chat and student context
  - name: studio
    description: Studio - upload sources, generate study outputs
  - name: user
    description: User profile, progress, achievements, activity
  - name: social
    description: Leaderboard and social stats
  - name: content
    description: Documents, notes
  - name: annotations
    description: Document annotations (strokes, text boxes)
  - name: notifications
    description: Notifications, briefings, preferences
  - name: platform
    description: Health, errors, enrollments, grades, materials, push
  - name: onboarding
    description: User onboarding
  - name: universities
    description: University directory and disciplines
  - name: billing
    description: Stripe checkout and webhooks
  - name: extension
    description: Browser extension auth and summary

security:
  - cookieAuth: []

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: better-auth.session_token
      description: Session cookie set by better-auth
    extensionToken:
      type: apiKey
      in: header
      name: X-Extension-Token
      description: Token issued to the browser extension
    stripeWebhook:
      type: apiKey
      in: header
      name: stripe-signature
      description: Stripe webhook signature

