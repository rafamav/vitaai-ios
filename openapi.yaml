      summary: Onboarding novo (P1+P2+P3 fork) — deriva journeyType + journeyConfig + contentOrganizationMode
      description: |
        Recebe payload com goal (P1), inFaculdade (P2), e campos específicos (P3 + jornada).
        Backend deriva automaticamente journeyType, journeyConfig e contentOrganizationMode
        usando a tabela canônica do plano (decisions/2026-04-27_jornada-3lentes-FINAL.md §7).

        Combinação inválida bloqueada: goal=FACULDADE + inFaculdade=graduated → HTTP 400.
