                      dailyGoal:
                        type: integer
        '500':
          $ref: '#/components/responses/ServerError'
  /api/user/files:
    get:
      tags: [user]
      operationId: listUserFiles
      summary: List every R2 file owned by the caller
      description: |
        Enumerates `users/<profileId>/...` in the R2 bucket. Gold-standard
        namespace — each file has a stable `kind` (transcricao, document,
        prova, trabalho, slide, studio-source, caderno, mindmap,
        simulado-report, avatar, import, subject-document) inferred from the
        key path. Use this to power a unified "Meus arquivos" screen or let
        the Vita MCP reason about what the user has stored.
      security:
        - cookieAuth: []
        - extensionToken: []
      parameters:
        - in: query
          name: kind
          schema:
            type: string
          description: Optional filter by FileKind
        - in: query
          name: subject
          schema:
            type: string
          description: Optional filter by subject slug (files under subjects/<slug>/)
        - in: query
          name: urls
          schema:
            type: string
            enum: ['0', '1']
          description: If `1`, include short-lived presigned GET URLs in the response
        - in: query
          name: cursor
          schema:
            type: string
          description: Pagination continuation token from a previous call
      responses:
        '200':
          description: File listing
          content:
            application/json:
              schema:
                type: object
                required: [files]
                properties:
                  files:
                    type: array
                    items:
                      type: object
                      required: [r2Key, size, lastModified]
                      properties:
                        r2Key:
                          type: string
                        kind:
                          type: string
                          nullable: true
                        size:
                          type: integer
                        lastModified:
                          type: string
                          format: date-time
                        url:
                          type: string
                          format: uri
                          nullable: true
                  nextCursor:
                    type: string
                    nullable: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          description: R2 not configured on this environment
    delete:
      tags: [user]
      operationId: deleteUserFile
      summary: Delete a single R2 file owned by the caller
      description: |
        Validates that the supplied key starts with `users/<profileId>/` —
        cross-user deletes are rejected with 403. Best-effort soft-deletes
        any DB row referencing the key (`documents`, `studio_sources`)
        before removing the R2 object.
      security:
        - cookieAuth: []
        - extensionToken: []
      parameters:
        - in: query
          name: key
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deletion acknowledged
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
        '400':
          description: key query parameter missing
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Key does not belong to the caller

