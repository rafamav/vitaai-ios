        - INTERNATO: 5º-6º ano, rotações sem notas tradicionais.
        - ENAMED: exame federal de medicina.
        - RESIDENCIA: foco em banca + especialidade-alvo.
        - REVALIDA: médicos formados no exterior, etapas 1ª e 2ª.

