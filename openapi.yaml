        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OnboardingV2Request'
      responses:
        '200':
          description: Onboarding salvo com derivações aplicadas
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  profile:
                    type: object
                    additionalProperties: true
                  derived:
                    type: object
