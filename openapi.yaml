      summary: Inicia sessão Pomodoro de foco
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [plannedDurationMinutes]
              properties:
                plannedDurationMinutes:
                  type: integer
                  minimum: 5
                  maximum: 180
                subjectId:
                  type: string
                  nullable: true
      responses:
        '200':
          description: Sessão criada
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string }
                  startedAt: { type: string, format: date-time }
                  plannedDurationMinutes: { type: integer }
        '400':
          description: plannedDurationMinutes fora de [5, 180]
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/study/focus/session/{id}/end:
    post:
      tags: [study]
      operationId: endFocusSession
      summary: Finaliza sessão Pomodoro (calcula XP, registra leaks)
      description: >
        XP rule: completed=true && actualDuration >= 80% planned → award
        floor(plannedDurationMinutes / 5) XP. Cada leak >= 5000ms decrementa
        1 XP (até min 0). Atualiza activity_logs (alimenta leaderboard
        semanal/mensal) + user_profiles.totalXp.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [completed]
              properties:
                completed: { type: boolean }
                leaks:
                  type: array
                  items:
                    type: object
                    required: [at, durationMs]
                    properties:
                      at: { type: string, format: date-time }
                      durationMs: { type: integer }
      responses:
        '200':
          description: Sessão finalizada
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string }
                  endedAt: { type: string, format: date-time }
                  actualDurationSeconds: { type: integer }
                  completed: { type: boolean }
                  xpAwarded: { type: integer }
                  leaksRecorded: { type: integer }
        '404':
          description: Session not found ou não pertence ao user
        '409':
          description: Sessão já finalizada
        '401':
          $ref: '#/components/responses/Unauthorized'

