  /api/documents/{id}/file:
    get:
      tags: [content]
      operationId: getDocumentFile
      summary: Serve document as PDF (auto-converts .docx/.xlsx/.pptx via LibreOffice headless, R2-cached)
      description: |
        Always returns a PDF. Source resolution:
          1. Source already PDF → R2/local/external proxy (validates %PDF magic).
          2. Source is convertible Office (.docx/.xlsx/.pptx/.odt/.rtf):
             a. Cache hit at R2 key 'converted/{id}.pdf' → serve cached.
             b. Cache miss → fetch original, soffice --convert-to pdf, upload
                to R2 cache (best-effort), serve. ~2-5s cold, <1s hot.
        Header X-Vita-Converted=fresh|cached emitted for converted sources.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: PDF file (Content-Disposition filename rewritten to .pdf when converted)
          headers:
            X-Vita-Converted:
              description: Present only for converted sources. 'fresh' = converted on this request, 'cached' = served from R2.
              schema:
                type: string
                enum: [fresh, cached]
            X-Vita-Cache-Hash:
              description: First 12 chars of sha256(source bytes) — cache key prefix. Same source content across users = same hash = same cache hit. Debug/observability.
              schema:
                type: string
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          description: Conversion failed (libreoffice error)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string }
                  detail: { type: string }

