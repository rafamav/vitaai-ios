      summary: Sentry pipeline diagnostic - captures one info + one exception for SDK health
      responses:
        '200':
          description: Sentry events dispatched
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  ts: { type: string }
                  messageId: { type: string }
                  exceptionId: { type: string }

  # 2026-04-22: adds universal page filter (no GFM table AND no academic keyword) + healthy-fingerprint fallback before LLM re-teach
  /api/portal/extract:
    post:
      tags: [portal]
      operationId: portalExtract
      summary: Extract data from HTML pages via per-page parallel vLLM calls (Qwen local). Parser-first when a portal_fingerprint exists for (portalType, instanceUrl); falls back to vLLM cold path otherwise. Fires grade_alert APNs push when a grade changes vs previous sync.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                pages:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      html:
                        type: string
                      linkText:
                        type: string
                instanceUrl:
                  type: string
                university:
                  type: string
                  nullable: true
                syncId:
                  type: string
                  nullable: true
                portalName:
                  type: string
                  nullable: true
              required: [pages, instanceUrl]
      responses:
        '200':
          description: Extraction result (returns immediately, processes in background)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  syncId:
                    type: string
                    description: Poll via /api/portal/sync-progress?syncId=X for progress
                  grades:
                    type: integer
                    description: Initially 0, updated via sync-progress polling
                  schedule:
                    type: integer
                    description: Initially 0, updated via sync-progress polling
                  pagesExtracted:
                    type: integer
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

