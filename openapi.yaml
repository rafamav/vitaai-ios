  # ════════════════════════════════════════
  # INTERNAL / CRON
  # ════════════════════════════════════════

  /api/cron/portal-sync:
    get:
      tags: [internal]
      operationId: cronPortalSync
      summary: Periodic portal sync worker (keep-alive + full re-sync, logs to sync_logs)
      description: "Protected by CRON_SECRET bearer token. Not for client use. Writes audit trail to vita.sync_logs. Cloudflare-protected Mannesoft connections (mannesoftprime.com) short-circuit at the top of the loop: only lastPingAt is bumped. No testPortalSession, no full-resync. Real re-sync is the silent-sync cron + client WebView path."
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Sync results
          content:
            application/json:
              schema:
                type: object
                properties:
                  processed:
                    type: integer
                  results:
                    type: array
                    items:
                      type: object
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/cron/portal-normalize:
    get:
      tags: [internal]
      operationId: cronPortalNormalize
      summary: Re-run the portal_grades → academic_subjects promoter for every active connection
      description: |
        Protected by CRON_SECRET bearer. Useful when the promoter logic changed
        (e.g. approved history wasn't being surfaced) or when Mannesoft is
        Cloudflare-blocked but the raw rows in portal_grades are still valid —
        triggers normalizePortalData(userId) per active connection owner.
        Does NOT fetch anything from the portal; purely in-DB reconciliation.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Reconcile results
          content:
            application/json:
              schema:
                type: object
                properties:
                  processed: { type: integer }
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        userId: { type: string }
                        ok: { type: boolean }
                        error: { type: string, nullable: true }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/cron/portal-silent-sync:
    get:
      tags: [internal]
      operationId: cronPortalSilentSync
      summary: Portal-agnostic silent push dispatcher — wakes iOS/Android in background
      description: |
        Scans active portal_connections whose lastSyncAt is older than the silent-sync TTL
        defined in portal-registry.ts for that portalType, and sends a silent APNs (iOS) or
        data-only FCM (Android) push so the app can refresh the portal session in the
        background (~30s window). Adding a new portal is one line in the registry.
        Protected by CRON_SECRET bearer. Run hourly via monstro crontab.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Dispatch results
          content:
            application/json:
              schema:
                type: object
                properties:
                  checked:
                    type: integer
                  pushed:
                    type: integer
                  skippedFresh:
                    type: integer
                  skippedNoPolicy:
                    type: integer
                  results:
                    type: array
                    items:
                      type: object
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/cron/close-stale-read-sessions:
    get:
      tags: [internal]
      operationId: cronCloseStaleReadSessions
      summary: Close qbank_sessions left active for more than 1 hour
      description: |
        Cron runs every minute. Marks qbank_sessions with status='active' and
        createdAt older than 1 hour as 'abandoned'. Without this, sessions pile
        up forever and iOS "Recent Sessions" UI shows stale placeholders.
        Protected by CRON_SECRET bearer token.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Cleanup result
          content:
            application/json:
              schema:
                type: object
                properties:
                  closedCount:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/cron/portal-silent-sync/device:
    post:
      tags: [internal]
      operationId: cronPortalSilentSyncDevice
      summary: Device-triggered portal keep-alive (Android silent push handler)
      description: |
        Called by the Android app after FCM wakes it with a silent data message (type=portal_sync).
        Authenticates via X-Extension-Token, then triggers server-side keep-alive / session refresh
        for the user's portal connections. Body fields are all optional — if omitted, refreshes ALL
        active connections for the authenticated user.
      security:
        - extensionToken: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                connectionId:
                  type: string
                  nullable: true
                portalType:
                  type: string
                  nullable: true
                instanceUrl:
                  type: string
                  nullable: true
      responses:
        '200':
          description: Keep-alive results
          content:
            application/json:
              schema:
                type: object
                properties:
                  refreshed:
                    type: integer
                  alive:
                    type: integer
                  expired:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/portal/force-sync:
    post:
      tags: [internal]
      operationId: portalForceSync
      summary: Force Canvas re-sync with API token
      description: Protected by CRON_SECRET. Accepts a Canvas Personal Access Token to re-scrape and ingest data.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                connectionId:
                  type: string
                  nullable: true
                token:
                  type: string
              required: [token]
      responses:
        '200':
          description: Sync results
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  scrape:
                    type: object
                  ingest:
                    type: object
        '401':
          $ref: '#/components/responses/Unauthorized'

