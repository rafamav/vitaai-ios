  /api/portal/filter-files:
    post:
      description: |
        Classifica PDFs do portal (Canvas/Mannesoft) usando LLM via brain('classify')
        -> LiteLLM :8788 -> Qwen local. Retorna apenas IDs de planos de ensino/ementas
        pra iOS baixar (economiza bandwidth: download seletivo em vez de todos PDFs).
        Migrado pra brain canonico em 2026-04-27 (Onda 2 epic agents-hub#3).
      tags: [portal]
      operationId: portalFilterFiles
      summary: LLM-based file filter — classify which files are planos de ensino (Langfuse-traced as process:portal-filter-files)
      security:
        - cookieAuth: []
        - extensionToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                files:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                      displayName:
                        type: string
                      contentType:
                        type: string
                      size:
                        type: integer
                    required: [id, displayName]
              required: [files]
      responses:
        '200':
          description: Filtered file IDs
          content:
            application/json:
              schema:
                type: object
                properties:
                  relevantFileIds:
                    type: array
                    items:
                      type: string
                  fallback:
                    type: boolean
                    description: True if regex fallback was used (LLM unavailable)
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/portal/sync-now:
    post:
      tags: [portal]
      operationId: triggerPortalSyncNow
      summary: User-triggered re-sync of active portal connections
      description: |
        Used by iOS pull-to-refresh on the Connections screen and any future
        "Sincronizar agora" button. Behavior per portalType:
          - canvas: server-side re-scrape + ingest, inline (~5–10s wall clock).
            lastSyncAt advances on success.
          - mannesoft: dispatches APNs silent push to the user's device for
            client-driven extract (Cloudflare cf_clearance lives in the iOS
            WKWebView store; SaaS-scale residential proxy is unviable).
            lastPingAt bumps immediately so the ConnectorCard exits "Sync
            travado" on the next status fetch.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                connectionIds:
                  type: array
                  items:
                    type: string
                  description: Optional. If empty/absent, re-syncs all active connections for the user.
      responses:
        '200':
          description: Re-sync dispatched
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  dispatched:
                    type: object
                    properties:
                      canvas:
                        type: array
                        items:
                          type: object
                          properties:
                            synced:
                              type: boolean
                            error:
                              type: string
                      mannesoft:
                        type: array
                        items:
                          type: object
                          properties:
                            dispatched:
                              type: boolean
                            error:
                              type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: No active connections to sync
        '500':
          $ref: '#/components/responses/ServerError'

