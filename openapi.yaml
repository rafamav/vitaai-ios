          type: string
        type:
          description: 'badge | flashcard | transcriptionReady | portal_announcement | portal_file_added | portal_assignment_added | portal_grade_posted | portal_update | portal_summary'
          type: string
        title:
          type: string
        description:
          type: string
        time:
          type: string
        read:
          type: boolean
        group:
          type: string
        route:
          type: string
          nullable: true
        priority:
          type: string
        createdAt:
          type: string
          format: date-time
        source:
          description: 'Portal slug (canvas, mannesoft, sigaa, ...) ou null para notif interna Vita. Usado pelo client pra renderizar icone do portal. Added 2026-04-27.'
          type: string
          nullable: true
        subjectId:
          description: 'Disciplina linkada (academic_subjects.id) — pra deep link na UI. Added 2026-04-27.'
          type: string
          nullable: true
        metadata:
          description: 'Payload self-contained com iconUrl + brandColor + portalDisplayName + extras (announcementId, fileId, courseId, etc). Resolved no momento da criacao. Added 2026-04-27.'
          type: object
          nullable: true
          additionalProperties: true

    Briefing:
      type: object
      properties:
        id:
          type: string
        subject:
          type: string
        module:
          type: string
          nullable: true
        summary:
          type: string
        keypoints:
          type: array
          items:
            type: string
        suggestedQuestions:
          type: array
          items:
            type: string
        connections:
          type: string
        filesAnalyzed:
          type: integer

    # ── Platform ──
    HealthCheck:
      type: object
      properties:
        status:
          type: string
        db:
          type: string
        uptime:
          type: number
        version:
          type: string
        checks:
          type: object
          nullable: true

    PortalSyncHealth:
      type: object
      required:
        - healthy
        - staleConnections
        - activeConnections
        - stalePct
        - thresholdMinutes
        - breakdown
        - checkedAt
      properties:
        healthy:
          type: boolean
        staleConnections:
          type: integer
        activeConnections:
          type: integer
        stalePct:
          type: integer
        oldestSyncAt:
          type: string
          format: date-time
          nullable: true
        thresholdMinutes:
          type: integer
        breakdown:
          type: object
          additionalProperties:
            type: integer
          description: Stale connection count grouped by portalType
        checkedAt:
          type: string
          format: date-time

    Grade:
      type: object
      properties:
        id:
          type: string
        subjectId:
          type: string
        label:
          type: string
        value:
          type: number
        maxValue:
          type: number
          nullable: true
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    Material:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        type:
          type: string
        subject:
          type: string
        size:
          type: integer
        addedAt:
          type: string
          format: date-time

    # ── Universities ──
    University:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        shortName:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        state:
          type: string
          nullable: true
        enameConcept:
          type: integer
          nullable: true
        portals:
          type: array
          items:
            $ref: '#/components/schemas/UniversityPortal'

    UniversityPortal:
      type: object
      properties:
        id:
          type: string
        portalType:
          type: string
        portalName:
          type: string
        instanceUrl:
          type: string
          nullable: true
        authMethod:
          type: string
          nullable: true

    Discipline:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        semester:
          type: integer
          nullable: true

    # ── Focus Session ──
    FocusSession:
      type: object
      required: [id, startedAt, plannedDurationMinutes, completed, xpAwarded]
      properties:
        id: { type: string }
        startedAt: { type: string, format: date-time }
        endedAt: { type: string, format: date-time, nullable: true }
        plannedDurationMinutes: { type: integer }
        actualDurationSeconds: { type: integer, nullable: true }
        subjectId: { type: string, nullable: true }
        leaks:
          type: array
          items:
            type: object
            properties:
              at: { type: string, format: date-time }
              durationMs: { type: integer }
        completed: { type: boolean }
        xpAwarded: { type: integer }

    # ── Referrals ──
    MyReferralResponse:
      type: object
      required: [code, isCustomized, shareUrl, rewards, totalInvited, totalQualified, totalDaysEarned]
      properties:
        code: { type: string }
        isCustomized: { type: boolean }
        shareUrl: { type: string }
        rewards:
          type: object
          properties:
            ownerDays: { type: integer }
            invitedDays: { type: integer }
        totalInvited: { type: integer }
        totalQualified: { type: integer }
        totalDaysEarned: { type: integer }
        myProUntil: { type: string, format: date-time, nullable: true }
        qualifiedFriends:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              qualifiedAt: { type: string, format: date-time }
        pendingFriends:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              signedUpAt: { type: string, format: date-time }

    # ── Privacy Preferences ──
    PrivacyPreferences:
      type: object
      description: >
        Switches de privacidade. Defaults: location=false, publicProfile=false,
        publicLeaderboard=true, telemetry=true. Vita não tem ads — sem campo
        de "anúncios personalizados".
      required: [location, publicProfile, publicLeaderboard, telemetry]
      properties:
        location:
          type: boolean
          description: Permite app pedir GPS pra features opcionais
        publicProfile:
          type: boolean
          description: Outros estudantes veem suas conquistas/streak/sessões
        publicLeaderboard:
          type: boolean
          description: Aparece no leaderboard (scope=user). False te tira do ranking visível
        telemetry:
          type: boolean
          description: Crash reports anônimos via Sentry. False desliga SentrySDK

    # ── Leaderboard ──
    LeaderboardEntry:
      type: object
      description: >
        Linha de ranking. `scope=user` retorna `name` do aluno + streak. `scope=university`
        retorna `name` da faculdade (shortName quando existe), `studentCount`, `state`, `city`.
      properties:
        rank:
          type: integer
        scope:
          type: string
          enum: [user, university]
          description: Tipo da linha. Default "user" (retrocompat).
        name:
          type: string
        xp:
          type: integer
        streak:
          type: integer
          description: Apenas em scope=user. Em scope=university é 0.
        isCurrentUser:
          type: boolean
          description: >
            scope=user — true se for o user logado. scope=university — true se
            o user logado pertence a essa faculdade.
        initials:
          type: string
        universityId:
          type: string
          nullable: true
          description: Apenas em scope=university.
        state:
          type: string
          nullable: true
          description: Apenas em scope=university (UF da instituição).
        city:
          type: string
          nullable: true
          description: Apenas em scope=university.
        studentCount:
          type: integer
          description: Apenas em scope=university (alunos somados pra esse XP).

    Dashboard:
      type: object
      properties:
        greeting:
          type: string
        subtitle:
          type: string
        hero:
          type: array
          items:
            $ref: '#/components/schemas/DashboardHeroCard'
        subjects:
          type: array
          items:
            $ref: '#/components/schemas/DashboardSubject'
        agenda:
          type: array
          items:
            $ref: '#/components/schemas/DashboardAgendaItem'
        flashcardsDueTotal:
          type: integer
        xp:
          type: object
          properties:
            total:
              type: integer
            level:
              type: integer

    DashboardHeroCard:
      description: |
        One card of the dashboard hero carousel.

        HERO RULES (backend-enforced, see src/app/api/dashboard/route.ts):
        - NEVER shows overdue evaluations. Filter is applied at DB query time
          (submitted=false AND date>now).
        - `label` text MUST reflect the source evaluation's `type`:
          exam→"PROVA", assignment→"TRABALHO", quiz→"QUIZ",
          seminar→"APRESENTAÇÃO", participation→"PARTICIPAÇÃO".
          Client trusts server label — never re-derive from title text.
        - `title` for assignments is the verbatim portal title (e.g. "AD1 — PNAISARI").
          Only exams get the synthesized "Prova de {subject}" pattern.
      type: object
      required: [type, title, subtitle, pills, action, urgency, cta, backgroundImage]
      properties:
        type:
          type: string
          enum: [exam, revision, streak]
          description: |
            Semantic bucket of the card. 'exam' is used for any evaluation (including
            assignment/quiz/seminar/participation) — the differentiation lives in `label`.
        label:
          type: string
          description: |
            Human-readable category label. For evaluation cards matches the source
            evaluation's type: PROVA/TRABALHO/QUIZ/APRESENTAÇÃO/PARTICIPAÇÃO. For
            other card types: REVISÃO, STREAK, etc.
        labelTone:
          type: string
          enum: [danger, warning, info, accent, neutral]
          description: Visual tone of the label pill. danger=overdue soon (<=3d), warning=normal upcoming, info=informational.
        title:
          type: string
        subtitle:
          type: string
        pills:
          type: array
          items:
            type: object
            properties:
              icon:
                type: string
              text:
                type: string
        action:
          type: object
          properties:
            type:
              type: string
            target:
              type: string
            id:
              type: string
              nullable: true
        urgency:
          type: integer
          description: 0-100, higher = more urgent
        cta:
          type: object
          required: [text]
          description: |
            Call-to-action label rendered inside the card (e.g. "Revisar agora",
            "Praticar"). Tap target is the whole card, governed by `action`.
          properties:
            text:
              type: string
            icon:
              type: string
              nullable: true
        backgroundImage:
          type: object
          required: [asset]
          description: |
            Hero artwork. `asset` is a key the client maps to a bundled image
            (e.g. "hero-exam", "hero-flashcards", "hero-qbank").
          properties:
            asset:
              type: string

    GradesCurrentResponse:
      type: object
      required: [current, completed, summary]
      properties:
        current:
          type: array
          items:
            $ref: '#/components/schemas/GradeSubject'
        completed:
          type: array
          items:
            $ref: '#/components/schemas/GradeSubject'
        summary:
          $ref: '#/components/schemas/GradesSummary'

    GradeSubject:
      type: object
      required: [subjectName, status]
      properties:
        id:
          type: string
          nullable: true
        subjectName:
          type: string
        professor:
          type: string
          nullable: true
        grade1:
          type: number
          nullable: true
        grade2:
          type: number
          nullable: true
        grade3:
          type: number
          nullable: true
        finalGrade:
          type: number
          nullable: true
        status:
          type: string
        attendance:
          type: number
          nullable: true
        absences:
          type: integer
          nullable: true
        workload:
          type: integer
          nullable: true
        disciplineSlug:
          type: string
          nullable: true
          description: Canonical catalog slug from vita.disciplines.
        canonicalName:
          type: string
          nullable: true
          description: Canonical name from vita.disciplines (joined).
        area:
          type: string
          nullable: true
          description: Catalog area (basica, clinica, cirurgica, etc.).
        icon:
          type: string
          nullable: true
          description: Icon slug from vita.disciplines.

    MaterialFolder:
      type: object
      required: [id, name, slug, icon, kind, sortOrder, docCount]
      description: |
        A folder inside a subject's "Materiais" section. 8 defaults are
        auto-created when a subject first appears (slides/provas/transcricoes/
        plano-ensino/mapas-mentais/briefings/casos-clinicos/outros). Custom
        folders are created via POST /api/subjects/{id}/folders.
      properties:
        id: { type: string }
        name: { type: string }
        slug:
          type: string
          description: |
            Stable identifier consumed by LLM/MCP. Defaults are one of the 8
            slugs above; customs are `custom-<uuid>`. Slug is immutable.
        icon:
          type: string
          description: SF Symbol name. Client maps to its own design system on Android.
        color: { type: string, nullable: true, pattern: '^#[0-9A-Fa-f]{6}$' }
        kind:
          type: string
          enum: [default, custom]
          description: Default folders cannot be deleted (only renamed).
        sortOrder: { type: integer }
        docCount: { type: integer }

    AcademicSubject:
      description: >
        Student's current enrollment — the SOT for "what the student is studying".
        Populated by portal connectors (Canvas/Mannesoft) or manual entry. The
        disciplineSlug field links to MedSimple catalog (vita.disciplines.slug)
        so QBank can filter questions by the student's actual subjects without
        a client-side taxonomy duplicate.
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
        displayName:
          description: >
            User-ownable display name (issue #170 phase A). UI shows
            displayName ?? name. Sync NEVER reads nor writes. PATCH via
            /api/subjects/{id} with {displayName: string|null}. Empty
            string and null both reset to the portal-canonical name.
          type: string
          nullable: true
        status:
          type: string
          nullable: true
        source:
          type: string
          nullable: true
        difficulty:
          type: string
          nullable: true
        disciplineSlug:
          description: >
            FK-like link to vita.disciplines.slug for QBank/Simulado filtering.
            Nullable while the backfill job hasn't matched this subject to a
            catalog entry (fuzzy match on canonicalName).
          type: string
          nullable: true
        canonicalName:
          type: string
          nullable: true
        professor:
          type: string
          nullable: true
        semester:
          type: string
          nullable: true
        workload:
          type: integer
          nullable: true
        area:
          description: Catalog area (basica, clinica, cirurgica, etc.) joined from vita.disciplines.
          type: string
          nullable: true
        icon:
          description: Icon slug from vita.disciplines, used for row rendering.
          type: string
          nullable: true
        needsReview:
          description: True when the LLM normalizer couldn't place this subject in the 96-row catalog.
          type: boolean
        questionCount:
          description: Total QBank questions available for this discipline slug (derived from qbank_topics join).
          type: integer
          nullable: true
        attendance:
          description: Attendance percent copied from academic_subjects.attendancePercent.
          type: number
          nullable: true
        absences:
          description: Absence count copied from academic_subjects.absences.
          type: integer
          nullable: true
        grade1:
          description: AP1/P1/N1 score derived from academic_evaluations (title regex).
          type: number
          nullable: true
        grade2:
          description: AP2/P2/N2 score derived from academic_evaluations (title regex).
          type: number
          nullable: true
        grade3:
          description: AP3/P3/N3 score derived from academic_evaluations (title regex).
          type: number
          nullable: true
        finalGrade:
          description: Final/Média/Exame score derived from academic_evaluations (title regex).
          type: number
          nullable: true

    GradesSummary:
      type: object
      properties:
        subjectsCount:
          type: integer
        averageAttendance:
          type: number
          nullable: true
        totalAbsences:
          type: integer
        averageGrade:
          type: number
          nullable: true
        totalWorkload:
          type: integer

    DashboardSubject:
      type: object
      properties:
        name:
          type: string
        shortName:
          type: string
        difficulty:
          type: string
          nullable: true
        vitaScore:
          type: number
          nullable: true
          description: 0-100 mastery score
        vitaTier:
          type: string
          nullable: true
          description: "tier label: bronze, silver, gold, diamond"
        # BYM-E2E-2026-04-17: fields surfaced so iOS MateriasAgendaWidget can render grades+attendance
        # from /api/dashboard alone (eliminating the ghost /api/grades/current route).
        subjectId:
          type: string
          nullable: true
        professor:
          type: string
          nullable: true
        status:
          type: string
          nullable: true
          description: "cursando | aprovado | reprovado | etc"
        grade1:
          type: number
          nullable: true
        grade2:
          type: number
          nullable: true
        grade3:
          type: number
          nullable: true
        finalGrade:
          type: number
          nullable: true
        attendance:
          type: number
          nullable: true
          description: 0-100 percent
        absences:
          type: integer
          nullable: true
        workload:
          type: integer
          nullable: true
        semester:
          type: string
          nullable: true
        disciplineSlug:
          type: string
          nullable: true
          description: Canonical catalog slug from vita.disciplines.
        canonicalName:
          type: string
          nullable: true
          description: Canonical name from vita.disciplines (joined).
        area:
          type: string
          nullable: true
          description: Catalog area (basica, clinica, cirurgica, etc.).
        icon:
          type: string
          nullable: true
          description: Icon slug from vita.disciplines.

    DashboardAgendaItem:
      type: object
      properties:
        type:
          type: string
        title:
          type: string
        daysUntil:
          type: integer
        date:
          type: string

    # ═══ Server-Driven UI ═══

    ScreenResponse:
      type: object
      required: [screenId, sections]
      properties:
        screenId:
          type: string
        sections:
          type: array
          items:
            $ref: '#/components/schemas/ScreenSection'

    ScreenSection:
      type: object
      required: [type, props]
      properties:
        type:
          type: string
          enum:
            - hero-carousel
            - hero-stat
            - section-label
            - tools-grid
            - subject-scroll
            - stat-grid
            - stat-row
            - glass-card
            - agenda-list
            - deck-list
            - row-list
            - leaderboard
            - heatmap
            - bar-chart
            - progress-ring
            - empty-state
            - action-button
        props:
          type: object
          additionalProperties: true

    ScreenAction:
      type: object
      properties:
        type:
          type: string
          enum: [navigate, sheet, link]
        target:
          type: string
        screenId:
          type: string
        id:
          type: string
        url:
          type: string

    StudyOverviewResponse:
      type: object
      required: [flashcards, qbank, simulados, transcricoes, subjects]
      properties:
        flashcards:
          $ref: '#/components/schemas/StudyOverviewFlashcards'
        qbank:
          $ref: '#/components/schemas/StudyOverviewQBank'
        simulados:
          $ref: '#/components/schemas/StudyOverviewSimulados'
        transcricoes:
          $ref: '#/components/schemas/StudyOverviewTranscricoes'
        subjects:
          type: array
          items:
            $ref: '#/components/schemas/StudyOverviewSubject'

    StudyOverviewFlashcards:
      type: object
      required: [totalDecks, totalCards, dueNow, reviewedToday]
      properties:
        totalDecks:
          type: integer
        totalCards:
          type: integer
        dueNow:
          type: integer
        reviewedToday:
          type: integer
        lastReviewAt:
          type: string
          format: date-time
          nullable: true

    StudyOverviewQBank:
      type: object
      required: [totalAnswered, accuracy, sessionsThisWeek]
      properties:
        totalAnswered:
          type: integer
        accuracy:
          type: number
          format: float
        sessionsThisWeek:
          type: integer
        lastSessionAt:
          type: string
          format: date-time
          nullable: true

    StudyOverviewSimulados:
      type: object
      required: [totalAttempts]
      properties:
        totalAttempts:
          type: integer
        avgScore:
          type: number
          format: float
          nullable: true
        lastScore:
          type: number
          format: float
          nullable: true
        lastAt:
          type: string
          format: date-time
          nullable: true

    StudyOverviewTranscricoes:
      type: object
      required: [total]
      properties:
        total:
          type: integer
        lastAt:
          type: string
          format: date-time
          nullable: true

    StudyOverviewSubject:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string

    CatalogStatusDiscipline:
      type: object
      required:
        - disciplineSlug
        - canonicalName
        - area
        - topicsN3
        - contentsN4
        - questionsActive
        - pctN3
        - pctN4
        - flashcardsTotal
        - flashcardsWithTopic
        - simuladosRef
        - gaps
      properties:
        disciplineSlug: { type: string }
        canonicalName: { type: string }
        area: { type: string }
        icon: { type: string, nullable: true }
        typicalSemester: { type: integer, nullable: true }
        topicsN3: { type: integer }
        topicsN3ExamContainers: { type: integer }
        contentsN4: { type: integer }
        questionsTotal: { type: integer }
        questionsActive: { type: integer }
        questionsWithN3: { type: integer }
        questionsWithN4: { type: integer }
        pctN3: { type: number }
        pctN4: { type: number }
        flashcardsTotal: { type: integer }
        flashcardsWithTopic: { type: integer }
        flashcardsNeedsTagging: { type: integer }
        simuladosRef: { type: integer }
        gaps:
          type: array
          items:
            type: string
            enum:
              - sem_topics_n3
              - low_n3_topics
              - sem_contents_n4
              - low_pct_n3
              - low_pct_n4
              - flashcards_without_topic
              - no_simulado_ref
              - too_many_exam_containers
        curado:
          type: boolean
          nullable: true
          description: null when area is out of scope (internato, vestibular)
        updatedAt: { type: string, format: date-time }

    PortalDiscoveryRun:
      type: object
      required:
        - id
        - universityId
        - universityName
        - portalType
        - instanceUrl
        - confidence
        - status
        - createdAt
      properties:
        id: { type: string, format: uuid }
        universityId: { type: string, format: uuid }
        universityName: { type: string }
        portalType:
          type: string
          enum: [canvas, moodle, sigaa, mannesoft]
        instanceUrl: { type: string, format: uri }
        confidence: { type: number, description: "0.0-1.0 from Haiku" }
        rationale: { type: string, nullable: true }
        status:
          type: string
          enum: [pending, approved, rejected]
        reviewedBy: { type: string, nullable: true }
        reviewedAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }

  responses:
    Unauthorized:
      description: Not authenticated
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Authenticated but not allowed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    PlanLimit:
      description: Plan limit reached - upgrade required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/PlanLimitError'
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

paths:
  # ════════════════════════════════════════
  # AUTH
  # ════════════════════════════════════════
  /api/auth/mobile-start:
    get:
      tags: [auth]
      operationId: mobileAuthStart
      summary: Start mobile OAuth flow
      security: []
      parameters:
        - name: provider
          in: query
          schema:
            type: string
            default: google
        - name: callbackURL
