  # 2026-04-20: Canvas module items scraping — files inside modules now discovered
      description: |
        Sends a lightweight request to active portal connections to keep PHP sessions alive.
        If a session has expired (login page returned), marks the connection as 'expired'.
        Optionally triggers data extraction if the last sync was over 1 hour ago.
      security:
        - cookieAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                connectionId:
                  type: string
                  description: Optional - ping only this connection. If omitted, pings all active connections.
      responses:
        '200':
          description: Keep-alive results
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  alive:
                    type: integer
                  expired:
                    type: integer
                  errors:
                    type: integer
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        connectionId:
                          type: string
                        instanceUrl:
                          type: string
                        status:
                          type: string
                          enum: [alive, expired, error]
                        syncTriggered:
                          type: boolean
                        error:
                          type: string
                          nullable: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/sentry-ping:
    get:
