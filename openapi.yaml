openapi: 3.1.0
info:
  title: Vita AI API
  version: 1.0.0
  # 2026-04-09: internal phantom table cleanup (no API surface changes)
  # 2026-04-09: cron-to-ingest auth fix (internal, no API surface changes)
  # 2026-04-09: portal extraction uses vLLM direct, chat includes portal data (no API surface changes)
  description: |
    Source-of-truth API specification for Vita AI across all platforms (Android, iOS, Web).
    Covers authentication, study tools, QBank, AI coaching, portal connectors, and more. Last updated: 2026-04-08.
  contact:
    name: BYMAV
    email: rafamav@pixio.cloud

servers:
  - url: https://app.vita-ai.cloud
    description: Production
  - url: http://localhost:3000
    description: Local development

tags:
  - name: auth
    description: Authentication (better-auth + mobile flows)
  - name: portal
    description: Unified academic portal connectors (Canvas, WebAluno)
  - name: study
    description: Study tools - flashcards, mindmaps, sessions, exams, transcription
  - name: qbank
    description: Question bank - questions, sessions, progress
  - name: simulados
    description: Mock exams / simulated tests
  - name: ai
    description: AI coach, OSCE, transcription
  - name: vita
    description: Vita chat and student context
  - name: studio
    description: Studio - upload sources, generate study outputs
  - name: user
    description: User profile, progress, achievements, activity
  - name: social
    description: Leaderboard and social stats
  - name: content
    description: Documents, notes
  - name: annotations
    description: Document annotations (strokes, text boxes)
  - name: notifications
    description: Notifications, briefings, preferences
  - name: platform
    description: Health, errors, enrollments, grades, materials, push
  - name: onboarding
    description: User onboarding
  - name: universities
    description: University directory and disciplines
  - name: billing
    description: Stripe checkout and webhooks
  - name: extension
    description: Browser extension auth and summary

security:
  - cookieAuth: []

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: better-auth.session_token
      description: Session cookie set by better-auth
    extensionToken:
      type: apiKey
      in: header
      name: X-Extension-Token
      description: Token issued to the browser extension
    stripeWebhook:
      type: apiKey
      in: header
      name: stripe-signature
      description: Stripe webhook signature

  schemas:
    # ── Common ──
    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required: [error]

    PlanLimitError:
      type: object
      properties:
        error:
          type: string
          example: plan_limit
        message:
          type: string
          example: Upgrade your plan to continue
        upgrade:
          type: boolean
          example: true

    # ── Auth ──
    AuthToken:
      type: object
      properties:
        token:
          type: string
        name:
          type: string
          nullable: true
        email:
          type: string
        image:
          type: string
          nullable: true
      required: [token, email]

    # ── Portal ──
    PortalConnection:
      type: object
      properties:
        id:
          type: string
        portalType:
          type: string
        portalName:
          type: string
          nullable: true
        instanceUrl:
          type: string
        status:
          type: string
        lastSyncAt:
          type: string
          format: date-time
          nullable: true
          description: Last time data was actually synced (ingest/scrape)
        lastPingAt:
          type: string
          format: date-time
          nullable: true
          description: Last successful keep-alive ping (session still valid)
        counts:
          type: object
          properties:
            subjects:
              type: integer
            evaluations:
              type: integer
            schedule:
              type: integer
            documents:
              type: integer
            semesters:
              type: integer

    PortalStatus:
      type: object
      properties:
        connected:
          type: boolean
        connections:
          type: array
          items:
            $ref: '#/components/schemas/PortalConnection'
        totals:
          type: object
          properties:
            subjects:
              type: integer
            evaluations:
              type: integer
            schedule:
              type: integer
            documents:
              type: integer
            semesters:
              type: integer

    CanvasIngestPayload:
      type: object
      properties:
        instanceUrl:
          type: string
        user:
          type: object
        courses:
          type: array
          items:
            $ref: '#/components/schemas/CanvasCourse'
        assignments:
          type: array
          items:
            $ref: '#/components/schemas/CanvasAssignment'
        files:
          type: array
          items:
            $ref: '#/components/schemas/CanvasFile'
        calendarEvents:
          type: array
          items:
            $ref: '#/components/schemas/CanvasCalendarEvent'
        errors:
          type: array
          items:
            type: object
        sessionCookies:
          type: string
          description: Canvas session cookies from iOS WKWebView for server-side keep-alive
          nullable: true
        pdfContents:
          type: array
          items:
            $ref: '#/components/schemas/CanvasPdfContent'
      required: [instanceUrl, courses, assignments, files, calendarEvents, errors]

    CanvasCourse:
      type: object
      properties:
        canvasCourseId:
          type: string
        name:
          type: string
        code:
          type: string
          nullable: true
        term:
          type: string
          nullable: true
        enrollmentType:
          type: string
        currentScore:
          type: number
          nullable: true
        finalScore:
          type: number
          nullable: true
        currentGrade:
          type: string
          nullable: true
        finalGrade:
          type: string
          nullable: true
        teachers:
          type: array
          items:
            type: string
      required: [canvasCourseId, name, enrollmentType, teachers]

    CanvasAssignment:
      type: object
      properties:
        canvasAssignmentId:
          type: string
        canvasCourseId:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        dueAt:
          type: string
          format: date-time
          nullable: true
        pointsPossible:
          type: number
          nullable: true
        score:
          type: number
          nullable: true
        grade:
          type: string
          nullable: true
        submittedAt:
          type: string
          format: date-time
          nullable: true
      required: [canvasAssignmentId, canvasCourseId, name]

    CanvasFile:
      type: object
      properties:
        canvasFileId:
          type: string
        canvasCourseId:
          type: string
        displayName:
          type: string
        contentType:
          type: string
        size:
          type: integer
        downloadUrl:
          type: string
          nullable: true
      required: [canvasFileId, canvasCourseId, displayName, contentType, size]

    CanvasCalendarEvent:
      type: object
      properties:
        canvasEventId:
          type: string
        title:
          type: string
        startAt:
          type: string
          format: date-time
          nullable: true
        endAt:
          type: string
          format: date-time
          nullable: true
        contextType:
          type: string
          nullable: true
      required: [canvasEventId, title]

    CanvasPdfContent:
      type: object
      properties:
        canvasFileId:
          type: string
        displayName:
          type: string
        contentType:
          type: string
        sizeBytes:
          type: integer
        base64:
          type: string
      required: [canvasFileId, displayName, contentType, sizeBytes, base64]

    WebAlunoIngestPayload:
      type: object
      properties:
        instanceUrl:
          type: string
        grades:
          type: array
          items:
            $ref: '#/components/schemas/WebAlunoGrade'
        curriculum:
          type: array
          items:
            $ref: '#/components/schemas/WebAlunoCurriculum'
        schedule:
          type: array
          items:
            $ref: '#/components/schemas/WebAlunoSchedule'
        evaluations:
          type: array
          items:
            $ref: '#/components/schemas/ScraperEvaluation'
        frequency:
          type: array
          items:
            $ref: '#/components/schemas/WebAlunoFrequency'
      required: [instanceUrl]

    WebAlunoGrade:
      type: object
      properties:
        subjectName:
          type: string
        subjectCode:
          type: string
          nullable: true
        grade1:
          type: string
          nullable: true
        grade2:
          type: string
          nullable: true
        grade3:
          type: string
          nullable: true
        finalGrade:
          type: string
          nullable: true
        status:
          type: string
          nullable: true
        attendance:
          type: string
          nullable: true
      required: [subjectName]

    WebAlunoCurriculum:
      type: object
      properties:
        subjectName:
          type: string
        semester:
          type: string
          nullable: true
        workload:
          type: string
          nullable: true
        finalGrade:
          type: string
          nullable: true
        status:
          type: string
          nullable: true
      required: [subjectName]

    WebAlunoSchedule:
      type: object
      properties:
        subjectName:
          type: string
        dayOfWeek:
          type: integer
        startTime:
          type: string
        endTime:
          type: string
        room:
          type: string
          nullable: true
        professor:
          type: string
          nullable: true
      required: [subjectName, dayOfWeek, startTime, endTime]

    WebAlunoFrequency:
      type: object
      properties:
        subjectName:
          type: string
        workload:
          type: string
          nullable: true
        absences:
          type: string
          nullable: true
        attendance:
          type: string
          nullable: true
      required: [subjectName]

    ScraperEvaluation:
      type: object
      properties:
        subjectName:
          type: string
        title:
          type: string
        type:
          type: string
          nullable: true
        date:
          type: string
          nullable: true
        weight:
          type: number
          nullable: true
        score:
          type: number
          nullable: true
      required: [subjectName, title]

    CanvasIngestResponse:
      type: object
      properties:
        success:
          type: boolean
        connectionId:
          type: string
        stats:
          type: object
          properties:
            courses:
              type: integer
            files:
              type: integer
            assignments:
              type: integer
            calendarEvents:
              type: integer
            subjectsWritten:
              type: integer
            evaluationsWritten:
              type: integer
            calendarWritten:
              type: integer
            pdfExtraction:
              type: integer
            errors:
              type: array
              items:
                type: string
            courseMapping:
              type: object

    WebAlunoIngestResponse:
      type: object
      properties:
        success:
          type: boolean
        grades:
          type: integer
        curriculum:
          type: integer
        schedule:
          type: integer
        frequency:
          type: integer
        academic:
          type: object
          properties:
            subjectsWritten:
              type: integer
            evalsWritten:
              type: integer
            schedWritten:
              type: integer

    PortalGrade:
      type: object
      properties:
        id:
          type: string
        subjectName:
          type: string
        subjectCode:
          type: string
          nullable: true
        grade1:
          type: string
          nullable: true
        grade2:
          type: string
          nullable: true
        grade3:
          type: string
          nullable: true
        finalGrade:
          type: string
          nullable: true
        status:
          type: string
        attendance:
          type: string
          nullable: true
        absences:
          type: string
          nullable: true
        workload:
          type: string
          nullable: true
        semester:
          type: string
          nullable: true
        professor:
          type: string
          nullable: true
        turma:
          type: string
          nullable: true
        source:
          type: string

    PortalScheduleItem:
      type: object
      properties:
        id:
          type: string
        subjectName:
          type: string
        dayOfWeek:
          type: integer
        startTime:
          type: string
        endTime:
          type: string
        room:
          type: string
          nullable: true
        professor:
          type: string
          nullable: true

    PortalEvaluation:
      type: object
      properties:
        id:
          type: string
        subjectId:
          type: string
        subjectName:
          type: string
        title:
          type: string
        type:
          type: string
        date:
          type: string
          format: date-time
          nullable: true
        pointsPossible:
          type: number
          nullable: true
        score:
          type: number
          nullable: true
        grade:
          type: string
          nullable: true
        status:
          type: string
          nullable: true
        submitted:
          type: boolean
          nullable: true

    PortalCalendarItem:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        type:
          type: string
        startAt:
          type: string
          format: date-time
        endAt:
          type: string
          format: date-time
          nullable: true
        subjectName:
          type: string
          nullable: true

    SyncProgress:
      type: object
      properties:
        syncId:
          type: string
        phase:
          type: string
        percent:
          type: number
        label:
          type: string
        grades:
          type: integer
        schedule:
          type: integer
        pagesDiscovered:
          type: integer
        pagesProcessed:
          type: integer
        error:
          type: string
          nullable: true

    # ── Study ──
    FlashcardDeck:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        title:
          type: string
        subjectId:
          type: string
          nullable: true
        deletedAt:
          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time
        cards:
          type: array
          items:
            $ref: '#/components/schemas/Flashcard'

    Flashcard:
      type: object
      properties:
        id:
          type: string
        deckId:
          type: string
        front:
          type: string
        back:
          type: string
        stability:
          type: number
          nullable: true
        difficulty:
          type: number
          nullable: true
        state:
          type: string
          nullable: true
        scheduledDays:
          type: integer
          nullable: true
        reps:
          type: integer
          nullable: true
        lapses:
          type: integer
          nullable: true
        nextReviewAt:
          type: string
          format: date-time
          nullable: true
        lastReviewAt:
          type: string
          format: date-time
          nullable: true

    FlashcardReviewResult:
      type: object
      properties:
        id:
          type: string
        stability:
          type: number
        difficulty:
          type: number
        state:
          type: string
        scheduledDays:
          type: integer
        reps:
          type: integer
        lapses:
          type: integer
        nextReviewAt:
          type: string
          format: date-time
        rating:
          type: integer
        preview:
          type: object
          properties:
            again:
              type: object
            hard:
              type: object
            good:
              type: object
            easy:
              type: object

    FlashcardStats:
      type: object
      properties:
        totalCards:
          type: integer
        pendingCards:
          type: integer
        learnedCards:
          type: integer
        retentionRate:
          type: number
        avgReviewTime:
          type: number
        decks:
          type: array
          items:
            type: object
        forecast:
          type: array
          items:
            type: object

    Mindmap:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        sourceIds:
          type: array
          items:
            type: string
        nodes:
          type: object
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Exam:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        subjectId:
          type: string
          nullable: true
        date:
          type: string
          format: date
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    StudySession:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        title:
          type: string
        duration:
          type: integer
        accuracy:
          type: number
          nullable: true
        date:
          type: string
          format: date-time

    StudyOverviewFlashcards:
      type: object
      required: [totalDecks, totalCards, dueNow, reviewedToday]
      properties:
        totalDecks:
          type: integer
        totalCards:
          type: integer
        dueNow:
          type: integer
        reviewedToday:
          type: integer
        lastReviewAt:
          type: string
          format: date-time
          nullable: true

    StudyOverviewQBank:
      type: object
      required: [totalAnswered, accuracy, sessionsThisWeek]
      properties:
        totalAnswered:
          type: integer
        accuracy:
          type: number
          description: 0..1
        sessionsThisWeek:
          type: integer
        lastSessionAt:
          type: string
          format: date-time
          nullable: true

    StudyOverviewSimulados:
      type: object
      required: [totalAttempts]
      properties:
        totalAttempts:
          type: integer
        avgScore:
          type: number
          nullable: true
        lastScore:
          type: number
          nullable: true
        lastAt:
          type: string
          format: date-time
          nullable: true

    StudyOverviewTranscricoes:
      type: object
      required: [total]
      properties:
        total:
          type: integer
        lastAt:
          type: string
          format: date-time
          nullable: true

    StudyOverviewSubject:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string

    StudyOverviewResponse:
      type: object
      required: [flashcards, qbank, simulados, transcricoes, subjects]
      properties:
        flashcards:
          $ref: '#/components/schemas/StudyOverviewFlashcards'
        qbank:
          $ref: '#/components/schemas/StudyOverviewQBank'
        simulados:
          $ref: '#/components/schemas/StudyOverviewSimulados'
        transcricoes:
          $ref: '#/components/schemas/StudyOverviewTranscricoes'
        subjects:
          type: array
          items:
            $ref: '#/components/schemas/StudyOverviewSubject'

    StudyPlanItem:
      type: object
      properties:
        id:
          type: string
        planId:
          type: string
          nullable: true
        planTitle:
          type: string
          nullable: true
        title:
          type: string
        description:
          type: string
          nullable: true
        subjectId:
          type: string
          nullable: true
        date:
          type: string
          format: date
        duration:
          type: integer
          nullable: true
        completed:
          type: boolean
        completedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time

    TrabalhosResponse:
      type: object
      properties:
        pending:
          type: array
          items:
            $ref: '#/components/schemas/Trabalho'
        completed:
          type: array
          items:
            $ref: '#/components/schemas/Trabalho'
        overdue:
          type: array
          items:
            $ref: '#/components/schemas/Trabalho'
        total:
          type: integer
    Trabalho:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        subjectName:
          type: string
        type:
          type: string
          enum: [assignment, quiz, seminar]
        status:
          type: string
        submitted:
          type: boolean
        submittedAt:
          type: string
          format: date-time
          nullable: true
        date:
          type: string
          format: date-time
          nullable: true
        daysUntil:
          type: integer
          nullable: true
        pointsPossible:
          type: number
          nullable: true
        score:
          type: number
          nullable: true
        grade:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        descriptionHtml:
          type: string
          nullable: true
        submissionTypes:
          type: array
          items:
            type: string
        canvasAssignmentId:
          type: string
          nullable: true
        canGenerate:
          type: boolean
    Transcription:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        status:
          type: string
        fileName:
          type: string
          nullable: true
        fileSize:
          type: integer
          nullable: true
        error:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    VoiceSession:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        title:
          type: string
        specialty:
          type: string
        caseId:
          type: string
          nullable: true
        steps:
          type: integer
        score:
          type: number
        date:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ── QBank ──
    QBankFilters:
      type: object
      properties:
        institutions:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              name:
                type: string
        topics:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              name:
                type: string
        years:
          type: array
          items:
            type: integer
        difficulties:
          type: array
          items:
            type: string
        totalQuestions:
          type: integer
        totalAllStages:
          type: integer
          nullable: true
        stage:
          type: string
          nullable: true

    QBankQuestion:
      type: object
      properties:
        id:
          type: integer
        statement:
          type: string
        year:
          type: integer
          nullable: true
        difficulty:
          type: string
          nullable: true
        institutionName:
          type: string
          nullable: true
        alternatives:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              description:
                type: string
              sortOrder:
                type: integer
              isCorrect:
                type: boolean
        images:
          type: array
          items:
            type: object
        topics:
          type: array
          items:
            type: object
        statistics:
          type: object
          nullable: true
        userAnswer:
          type: object
          nullable: true

    QBankProgress:
      type: object
      properties:
        totalAvailable:
          type: integer
        totalAnswered:
          type: integer
        totalCorrect:
          type: integer
        totalAnswers:
          type: integer
        accuracy:
          type: number
        byDifficulty:
          type: array
          items:
            type: object
        byTopic:
          type: array
          items:
            type: object

    QBankSession:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
          nullable: true
        questionCount:
          type: integer
        answeredCount:
          type: integer
        correctCount:
          type: integer
        score:
          type: number
          nullable: true
        createdAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
          nullable: true

    QBankList:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        questionCount:
          type: integer

    # ── Simulados ──
    SimuladoAttempt:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        subjectId:
          type: string
          nullable: true
        timed:
          type: boolean
        timeLimitMinutes:
          type: integer
          nullable: true
        totalQ:
          type: integer
        correctQ:
          type: integer
        wrongQ:
          type: integer
        blankQ:
          type: integer
        score:
          type: number
          nullable: true
        timeSpent:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
          nullable: true

    SimuladoQuestion:
      type: object
      properties:
        id:
          type: string
        statement:
          type: string
        options:
          type: array
          items:
            type: string
