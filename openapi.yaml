    get:
      tags: [qbank]
      operationId: getQBankSession
      summary: Get a QBank session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Session details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QBankSession'
        '401':
