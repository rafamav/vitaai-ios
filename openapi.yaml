                      qbankTopics: { type: integer }
                      qbankInstitutions: { type: integer }
                      universityPortals: { type: integer }
                      portalsLMS: { type: integer }
                      portalsInstitucional: { type: integer }
                      portalsAuxiliar: { type: integer }
                      coverageCompleta: { type: integer }
                      coverageSoLMS: { type: integer }
                      coverageSoInstitucional: { type: integer }
                      coverageSemNada: { type: integer }
                      fingerprintsActive: { type: integer }
