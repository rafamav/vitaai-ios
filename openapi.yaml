                  type: string
                  nullable: true
              required: [alternativeId]
      responses:
        '200':
          description: Answer result
          content:
            application/json:
              schema:
                type: object
                required: [isCorrect, answerId]
                properties:
                  isCorrect:
                    type: boolean
                  answerId:
                    type: integer
                  xpDelta:
                    type: integer
                    description: XP awarded this answer (+5 correct, +1 wrong)
                  totalXp:
                    type: integer
                    description: User total XP after this answer
                  newLevel:
                    type: integer
                    description: User level after this answer (floor(totalXp/100))
                  leveledUp:
                    type: boolean
                    description: True if this answer caused a level up
        '401':
          $ref: '#/components/responses/Unauthorized'
        '402':
          $ref: '#/components/responses/PlanLimit'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
