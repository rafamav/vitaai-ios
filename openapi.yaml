  /api/stream:
    get:
      summary: Realtime SSE feed (multiplexed across domains)
      description: |
        Single SSE connection that delivers every realtime event for the
        authenticated user — subjects, evaluations, grades, flashcards,
        qbank, planner, notes, documents, transcricoes, etc.

        Architecture: shell.md section 3.1 — REALTIME SYNC.

        Frame format (line-delimited):
          id: <eventId>
          data: {"domain":"<d>","op":"upsert|delete|invalidate","recordId":"<id>","payload":<json>}

        Heartbeat comment `:hb` every 25s.

        Resume after disconnect: send Last-Event-ID header with last id
        received. Server replays missed events (max 1000, 7-day retention)
        then enters live mode.
      operationId: streamRealtime
      tags: [Realtime]
      parameters:
        - in: header
          name: Last-Event-ID
          required: false
          schema:
            type: string
          description: Last event id received in a previous session — server replays events with id > this value.
      responses:
        '200':
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string
                description: "Stream of `id` + `data: <json>` frames separated by blank lines."
        '401':
          description: Unauthorized

