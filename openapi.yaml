          description: 'Slug original MedEvo (cross-match Vita x MedEvo). Rastreia origem cursinho. Added 2026-04-27.'
          type: string
          nullable: true
        medevoArea:
          description: 'Area cursinho-style MedEvo (7 valores). Tag PARALELA a arvore canonica BYMAV. Mapeada para examArea INEP via vita.exam_area_mapping. Added 2026-04-27.'
          type: string
          nullable: true
          enum: ["Clinica Medica", "Cirurgia", "Pediatria", "Ginecologia", "Obstetricia", "Medicina Preventiva e Social", "Oftalmologia", "Saude Mental"]
        medevoTopic:
          description: 'Topic granular MedEvo (~169 valores). Tag PARALELA. Added 2026-04-27.'
          type: string
          nullable: true
        medevoSubtopic:
          description: 'Subtopic ultra-granular MedEvo (~799 valores). Tag PARALELA. Added 2026-04-27.'
          type: string
          nullable: true
        examGreatAreaSlug:
          description: |
            Grande área CNRM/Enare (5 fixas). Derivada de disciplineSlug e/ou
            medevoArea via mapping declarativo. Usada por Jornada-com-objetivo
            (Residência/ENAMED/Revalida) e modo great-areas do toggle 3 lentes.
            SOT da decisão: agent-brain/decisions/2026-04-27_jornada-3lentes-FINAL.md
            Cobertura atual: 88.8% das Q reais (não-sintéticas). Updated 2026-04-27.
          type: string
          nullable: true
          enum: [clinica-medica, cirurgia-geral, ginecologia-obstetricia, pediatria, medicina-preventiva-social]
        pblSystemSlug:
          description: |
            Sistema PBL (12 fixos). Derivada de disciplineSlug via mapping
            declarativo. Usada pelo modo PBL do toggle 3 lentes (faculdades
            modulares: UFRN, FAMETRO, USP-RP, UFOP, CESUPA).
            Cobertura atual: 77.1% das Q reais. Updated 2026-04-27.
          type: string
          nullable: true
          enum:
            - cardiovascular
            - respiratorio
            - renal-urinario
            - endocrino-metabolico
            - digestorio
            - nervoso
            - hematologico-imunologico
            - locomotor
            - reprodutor-sexualidade
            - saude-mental-comportamento
            - infectoparasitario
            - integrado-aps
        isSynthetic:
          description: 'true se Q gerada (sem institutionId + year>=2025 + source=medsimple). false se prova real. Filtrar isSynthetic=false para Jornada-com-objetivo. Added 2026-04-27.'
          type: boolean
          default: false
        matchConfidence:
          description: 'Confianca cross-match MedEvo. 1.0=exato fingerprint SHA1 normalizado, 0.85-0.99=fuzzy MinHash+LSH, null=sem match. Added 2026-04-27.'
          type: number
          format: float
          nullable: true

