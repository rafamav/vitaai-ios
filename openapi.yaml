      type: object
      description: |
        Payload do onboarding novo (Onda 5a). Backend deriva journeyType,
        journeyConfig e contentOrganizationMode via tabela canônica.
        SOT: agent-brain/decisions/2026-04-27_jornada-3lentes-FINAL.md §7
      required: [goal]
      properties:
        goal:
          type: string
          enum: [FACULDADE, ENAMED, RESIDENCIA, REVALIDA]
          description: P1 — objetivo macro
        inFaculdade:
          type: string
          enum: [yes, graduated, skip]
          description: P2 — status faculdade. Obrigatório exceto se goal=REVALIDA
        semester:
          type: integer
          minimum: 1
          maximum: 12
          nullable: true
          description: Obrigatório se inFaculdade=yes. 1-8=FACULDADE, 9-12=INTERNATO
        university:
          type: string
          nullable: true
          description: Display name da universidade
        universityId:
          type: string
          nullable: true
          description: FK universities.id (preferido)
        universityLms:
          type: string
          nullable: true
          description: 'Portal LMS: canvas|mannesoft|moodle|sigaa|totvs'
        selectedSubjects:
          type: array
          items:
            oneOf:
              - type: string
              - type: object
                properties:
                  id:
                    type: string
                  difficulty:
                    type: string
                    enum: [easy, med, hard]
                    nullable: true
        studyGoal:
          type: string
          nullable: true
          description: Objetivo de estudo (Aprovar 1ª, Top 10%, etc)
