    get:
      tags: [admin]
      operationId: getAdminPortalDiscovery
      summary: List portal URL discovery runs (admin only)
      description: |
        Returns summary of catalog URL coverage and the most recent pending
        discovery candidates awaiting human approval. Backed by staging table
        `vita.portal_discovery_runs`. Does NOT expose production portal URLs
        directly; only candidate rows produced by Haiku.
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Discovery summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  summary:
                    type: object
                    properties:
                      totalUniversities: { type: integer }
                      withPortalUrl: { type: integer }
                      missingPortalUrl: { type: integer }
                      pendingRuns: { type: integer }
                  pending:
                    type: array
                    items:
                      $ref: '#/components/schemas/PortalDiscoveryRun'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [admin]
      operationId: runAdminPortalDiscovery
      summary: Trigger Haiku portal URL discovery for universities (admin only)
      description: |
        Asks Haiku (via Hub, OAuth Max — not Anthropic API) to suggest portal
        URLs for one university (`universityId`) or a batch (`scope: 'missing'`
        or `'all'`). Results land in `vita.portal_discovery_runs` as pending
        candidates. Batch capped at 50 universities per call. Never writes
        to `university_portals` directly.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                universityId: { type: string, format: uuid, nullable: true }
                scope:
                  type: string
                  enum: [missing, all]
                  nullable: true
      responses:
        '200':
          description: Discovery started, candidates staged
          content:
            application/json:
              schema:
                type: object
                properties:
                  processed: { type: integer }
                  candidatesCreated: { type: integer }
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        universityId: { type: string }
                        error: { type: string }
        '400':
          description: Bad request (missing universityId or invalid scope)
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/admin/portal-discovery/approve:
    post:
      tags: [admin]
      operationId: approveAdminPortalDiscovery
      summary: Approve or reject discovery candidates (admin only)
      description: |
        Marks rows in `vita.portal_discovery_runs` as approved/rejected by run id.
        Approved candidates are upserted into `vita.university_portals` (dedup
        by portalType + instanceUrl). Rejected rows stay in staging for audit.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                approve:
                  type: array
                  items: { type: string, format: uuid }
                reject:
                  type: array
                  items: { type: string, format: uuid }
      responses:
        '200':
          description: Rows processed
          content:
            application/json:
              schema:
                type: object
                properties:
                  approved: { type: integer }
                  rejected: { type: integer }
                  upserted: { type: integer }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'


