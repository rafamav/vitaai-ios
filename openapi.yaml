      operationId: createSimuladoFromTemplate
      summary: Spawn a new simulado attempt from a template slug
      description: >
        Backend selects active, non-cancelled questions from each discipline
        in the template's distribution proportional to its weight. Disciplines
        with zero coverage are skipped and their slack redistributed.
        (issue #101 item 7)
      requestBody:
        required: true
        content:
