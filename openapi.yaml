        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/whatsapp/status:
    get:
      tags: [notifications]
      operationId: getWhatsappStatus
      summary: Current WhatsApp linking status for the authenticated user
      responses:
        '200':
          description: Status
          content:
            application/json:
              schema:
                type: object
                properties:
                  phone: { type: string, nullable: true, description: E.164 without `+` (null if not linked) }
                  verified: { type: boolean }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/whatsapp/link:
    post:
      tags: [notifications]
      operationId: linkWhatsapp
      summary: Send a 6-digit OTP to the given phone via ZAP API (GOWA)
      description: |
        Generates a short-lived (10 min) 6-digit code, persists it in
        `whatsapp_verifications`, and sends it as a WhatsApp message to the
        provided phone. Rate-limited to 1 request per minute per user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone]
              properties:
                phone:
                  type: string
                  description: E.164 without `+` (e.g. `5551993924561`). Non-digits are stripped.
      responses:
        '200':
          description: Code sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  phone: { type: string }
                  expiresAt: { type: string, format: date-time }
        '400':
          description: Invalid phone
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          description: Rate limited (cooldown 60s)
        '502':
          description: GOWA unreachable / send failed

  /api/whatsapp/verify:
    post:
      tags: [notifications]
      operationId: verifyWhatsapp
      summary: Confirm the OTP and flip whatsappVerified=true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
                  description: 6-digit code received on WhatsApp.
      responses:
        '200':
          description: Verified
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  verified: { type: boolean }
        '400':
          description: Wrong code / invalid format
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: No active code (ask for a new one)
        '429':
          description: Too many wrong attempts (ask for a new code)

  /api/whatsapp/unlink:
    post:
      tags: [notifications]
      operationId: unlinkWhatsapp
      summary: Clear phone and whatsappVerified flag for the authenticated user
      responses:
        '200':
          description: Unlinked
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Profile not found

  /api/whatsapp/webhook:
    post:
      tags: [notifications]
      operationId: whatsappInboundWebhook
      summary: Inbound webhook from GOWA ZAP API
      description: |
        Receives inbound message events from the GOWA oficial
        (`ghcr.io/aldinokemal/go-whatsapp-web-multidevice`). Requires HMAC
        SHA256 signature in `X-Hub-Signature-256` computed with
        `WHATSAPP_WEBHOOK_SECRET`. Dedupes by `payload.id` (GOWA retries up
        to 5x on non-2xx) via `whatsapp_inbound_messages` table, resolves
        `from` → userId through `notification_preferences.whatsappPhone`
        (requires `whatsappVerified=true`), and runs the Vita coach turn via
        `runVitaChatTurn` — reply goes back through the same WhatsApp channel.
      security: []
      parameters:
        - name: X-Hub-Signature-256
          in: header
          required: true
          schema:
            type: string
          description: '`sha256=<hex>` — HMAC SHA256 of the raw request body with WHATSAPP_WEBHOOK_SECRET'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                event: { type: string, example: message }
                device_id: { type: string }
                payload:
                  type: object
                  properties:
                    id: { type: string }
                    chat_id: { type: string }
                    from: { type: string }
                    from_name: { type: string }
                    timestamp: { type: string, format: date-time }
                    is_from_me: { type: boolean }
                    body: { type: string }
      responses:
        '200':
          description: Event processed or skipped
        '400':
          description: Invalid JSON
        '401':
          description: Invalid HMAC signature
        '500':
          description: WHATSAPP_WEBHOOK_SECRET not set

