  /api/qbank/sessions:
    get:
      tags: [qbank]
      operationId: getQBankSessions
      summary: List recent QBank sessions (last 20)
      responses:
        '200':
          description: Sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/QBankSession'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'
    post:
      tags: [qbank]
      operationId: createQBankSession
      summary: QBank session endpoints (status enum updated 2026-04-17)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                questionCount:
                  type: integer
                  nullable: true
                institutionIds:
                  type: array
                  items:
                    type: integer
                  nullable: true
                years:
                  type: array
                  items:
                    type: integer
                  nullable: true
                difficulties:
                  type: array
                  items:
                    type: string
                  nullable: true
                topicIds:
                  type: array
                  items:
                    type: integer
                  nullable: true
                subjectIds:
                  description: >
                    [PREFERRED 2026-04-17b] Filter questions by the student's academic_subjects.id.
                    Backend resolves each subjectId → disciplineSlug (via academic_subjects.disciplineSlug
                    or fuzzy match on canonicalName) and filters qbank_questions accordingly.
                    This is the SOT path — client should pass subjects the student is actually
                    enrolled in, not catalog slugs.
                  type: array
                  items:
                    type: string
                  nullable: true
                disciplineSlugs:
                  deprecated: true
                  description: >
                    [DEPRECATED] Direct filter by MedSimple catalog slug. Kept for fallback when
                    student has no academic_subjects (no portal connected yet). Prefer subjectIds.
                  type: array
                  items:
                    type: string
                  nullable: true
                onlyResidence:
                  type: boolean
                  nullable: true
                stage:
                  type: string
                  nullable: true
                onlyUnanswered:
                  type: boolean
                  nullable: true
                title:
                  type: string
                  nullable: true
                excludeNoExplanation:
                  type: boolean
                  nullable: true
                  description: >
                    Quality filter — drop questions com explanation NULL ou
                    length<=50 chars. Default true client-side. Added 2026-04-27.
                includeSynthetic:
                  type: boolean
                  nullable: true
                  description: >
                    Quality filter — when false, drop LLM-generated questions
                    (isSynthetic=true; year>=2025, source=medsimple). Default
                    true. Added 2026-04-27.
      responses:
        '201':
          description: Session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QBankSession'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

