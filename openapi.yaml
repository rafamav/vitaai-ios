          nullable: true
          description: 'Bancas-alvo (apenas goal=RESIDENCIA)'
        currentStage:
          type: string
          enum: [PRIMEIRA, SEGUNDA]
          nullable: true
          description: 'Etapa Revalida (apenas goal=REVALIDA)'
        focusAreas:
          type: array
          items:
            type: string
          nullable: true
          description: 'Áreas de foco (apenas goal=REVALIDA)'

    JourneyType:
      type: string
      enum: [FACULDADE, INTERNATO, ENAMED, RESIDENCIA, REVALIDA]
      description: |
        Jornada universal do usuário. Substitui a tab "Faculdade" por uma tab
        "Jornada" que adapta o conteúdo (cards, conectores, mascote) ao
        contexto. SOT: agent-brain/decisions/2026-04-27_jornada-plano-consolidado.md

