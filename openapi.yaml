        derivado de journeyType + university.curriculumMethod (override
        pessoal sempre vence).
        - 'tradicional': 96 disciplinas (Anatomia, Fisio, Cardio...)
        - 'pbl': 12 sistemas integrados (Cardiovascular, Respiratório...)
        - 'great-areas': 5 grandes áreas CNRM/Enare (Clínica/Cirurgia/GO/Pediatria/MPS)
        SOT: agent-brain/decisions/2026-04-27_jornada-3lentes-FINAL.md

