  /api/notifications:
  # 2026-04-22: upcomingExams now filters academicEvaluations.type='exam' so Canvas assignments (AD/ADE/TDE) don't show as provas
    # 2026-04-21: notification.type now includes 'assignment' | 'seminar' alongside existing 'exam' — copy + route differ per evaluation.type (no API shape change, only enum widened in Notification schema)
    # 2026-04-21b: notification id now stable sha1(user|title|date) for exams (dedupes across atomic-swap resyncs); createdAt emitted as issue-time not event-date (no API shape change)
    get:
      tags: [notifications]
      operationId: getNotifications
      summary: Get all notifications for current user
      responses:
        '200':
          description: Notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Notification'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'
    post:
      tags: [notifications]
      operationId: markNotificationsRead
      summary: Mark notifications as read
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  items:
                    type: string
                markAll:
                  type: boolean
                  description: Mark all notifications as read (camelCase form)
                mark_all:
                  type: boolean
                  description: snake_case alias accepted for clients that auto-encode body keys (iOS HTTPClient)
      responses:
        '200':
          description: Marked
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  updated:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'
    delete:
      tags: [notifications]
      operationId: deleteNotifications
      summary: Soft-dismiss notifications (tombstone). GitHub-style "mark as done" + Google AIP-164 §3 soft-delete. Tombstone preserves deterministic PK so cron generators (flashcards-due-{userId}-{date}, badge-{id}) hit ON CONFLICT DO NOTHING and skip recreation.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  items:
                    type: string
                deleteAllRead:
                  type: boolean
                  description: Dismiss all notifications already marked as read.
      responses:
        '200':
          description: Dismissed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  dismissed:
                    description: Either array of dismissed ids (when ids passed) or count (when deleteAllRead).
                    oneOf:
                      - type: array
                        items:
                          type: string
                      - type: integer
        '400':
          description: Bad request — neither ids nor deleteAllRead
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

