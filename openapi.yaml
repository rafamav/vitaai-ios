      parameters:
        - name: system
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Anatomy data (structure varies)
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/bootstrap:
    get:
      tags: [platform]
      operationId: appBootstrap
      summary: App launch bootstrap (1-RTT, Duolingo/Spotify pattern)
      description: |
        Aggregates profile + subjects + evaluations + flashcardDecks + qbankRecentSessions + audioSources in a single response.
        Replaces 12+ serialized requests on app launch with one parallel server-side Promise.all.
      responses:
        '200':
          description: Bootstrap payload
          content:
            application/json:
              schema:
                type: object
                required: [schemaVersion, elapsedMs, profile, subjects, evaluations, flashcardDecks, qbankRecentSessions, audioSources]
                properties:
                  schemaVersion:
                    type: integer
                  elapsedMs:
                    type: integer
                  profile:
                    type: object
                  subjects:
                    type: array
                    items: { type: object }
                  evaluations:
                    type: array
                    items: { type: object }
                  flashcardDecks:
                    type: array
                    items: { type: object }
                  qbankRecentSessions:
                    type: array
                    items: { type: object }
                  audioSources:
                    type: array
                    items: { type: object }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Profile not found
        '500':
          $ref: '#/components/responses/ServerError'

  /api/cron/studio-stuck-sweeper:
    get:
      tags: [platform]
      operationId: cronStudioStuckSweeper
      summary: Marca studio_sources presos como failed + dispara notificação
      description: |
        Cron a cada 5min. Critério:
          - status='uploading' AND createdAt < now() - 10min
          - status='processing' AND createdAt < now() - 30min
        Pra cada item, marca status='failed' + chama notify(uploadFailed|transcriptionFailed)
        e recomputa storageBytesUsed do user afetado.
      security: []
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
            example: 'Bearer vita-cron-dev'
      responses:
        '200':
          description: Sweep result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  swept: { type: integer }
                  notified: { type: integer }
                  cutoffs:
                    type: object
                    properties:
                      uploadingOlderThan: { type: string, format: date-time }
                      processingOlderThan: { type: string, format: date-time }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/cron/whisper-backfill-segments:
    get:
      tags: [platform]
      operationId: cronWhisperBackfillSegments
      summary: Re-transcreve audio sources sem word timestamps (one-shot pra ativar karaoke)
      description: |
        Para cada studio_source.audio com status=ready e metadata.segments[0].words=null,
        baixa do R2, re-roda Whisper pedindo timestamp_granularities=word, e atualiza
        metadata com segments contendo words por segment. Idempotente.
      security: []
      parameters:
        - name: Authorization
          in: header
          required: true
          schema: { type: string, example: 'Bearer vita-cron-dev' }
        - name: limit
          in: query
          schema: { type: integer, default: 50, maximum: 100 }
      responses:
        '200':
          description: Backfill result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  candidates: { type: integer }
                  processed: { type: integer }
                  skipped: { type: integer }
                  failed: { type: integer }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/cron/whisper-backfill-chapters:
    get:
      tags: [platform]
      operationId: cronWhisperBackfillChapters
      summary: Re-gera chapters Qwen pra audio sources sem metadata.chapters
      description: |
        Para cada studio_source.audio com status=ready, segments presentes mas
        SEM metadata.chapters, chama lib/ai/transcript-chapters.ts (Qwen vLLM)
        e salva. Idempotente. Skip se gravacao <60s ou <2 segments.
      security: []
      parameters:
        - name: Authorization
          in: header
          required: true
          schema: { type: string, example: 'Bearer vita-cron-dev' }
        - name: limit
          in: query
          schema: { type: integer, default: 30, maximum: 50 }
      responses:
        '200':
          description: Backfill chapters result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  candidates: { type: integer }
                  processed: { type: integer }
                  skipped: { type: integer }
                  failed: { type: integer }
        '401':
          $ref: '#/components/responses/Unauthorized'

