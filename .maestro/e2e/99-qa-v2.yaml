appId: com.bymav.vitaai
tags:
  - e2e
  - qa
---

# ═══════════════════════════════════════════════
# QA v2 — Uses accessibilityIdentifier selectors
# Requires: feat/ios-gold-redesign-full with a11y IDs
# ═══════════════════════════════════════════════

- launchApp:
    clearState: false
    stopApp: false

- waitForAnimationToEnd

# ─── HOME ───
- takeScreenshot: "qa-01-home"

# Scroll down to see full home
- swipe:
    direction: UP
    duration: 500
- waitForAnimationToEnd
- takeScreenshot: "qa-02-home-scroll"

# Scroll back up
- swipe:
    direction: DOWN
    duration: 500
- waitForAnimationToEnd

# ─── QUESTOES ───
- tapOn:
    id: "tool_questoes"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: "qa-03-questoes"
- tapOn:
    id: "backButton"
    optional: true
- pressKey: back
- waitForAnimationToEnd

# ─── FLASHCARDS ───
