name: VitaAI

options:
  bundleIdPrefix: com.bymav
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15"
  createIntermediateGroups: true

packages:
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: "8.40.0"
  PostHog:
    url: https://github.com/PostHog/posthog-ios
    from: "3.15.0"


settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_BITCODE: NO
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

targets:
  VitaAI:
    type: application
    platform: iOS
    sources:
      - path: VitaAI
        excludes:
          - "**/*.md"
    info:
      path: VitaAI/Info.plist
      properties:
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSHealthShareUsageDescription: "VitaAI usa dados de sono e exercicio para correlacionar com seu desempenho academico."
        NSHealthUpdateUsageDescription: "VitaAI pode registrar sessoes de estudo como atividade mindfulness na Saude, so com sua permissao."
        NSMicrophoneUsageDescription: "VitaAI precisa do microfone para gravar suas aulas e gerar transcricoes automaticas."
        NSSpeechRecognitionUsageDescription: "VitaAI usa reconhecimento de fala para transcrever suas aulas em tempo real."
        UIBackgroundModes:
          - remote-notification
        UILaunchScreen: {}
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        CFBundleURLTypes:
          - CFBundleURLName: com.bymav.vitaai
            CFBundleURLSchemes:
              - vitaai
    dependencies:
      - package: Sentry
      - package: PostHog
    settings:
      base:
        PRODUCT_NAME: VitaAI
        PRODUCT_BUNDLE_IDENTIFIER: com.bymav.vitaai
        DEVELOPMENT_TEAM: PJ8972D48J
        INFOPLIST_FILE: VitaAI/Info.plist
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        CODE_SIGN_ENTITLEMENTS: VitaAI/VitaAI.entitlements
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          DEBUG_INFORMATION_FORMAT: dwarf
        Release:
          CODE_SIGN_STYLE: Automatic
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
          VALIDATE_PRODUCT: YES
    scheme:
      testTargets:
        - VitaAIUITests
  VitaAIUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: VitaAIUITests
    dependencies:
      - target: VitaAI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bymav.vitaai.uitests
        DEVELOPMENT_TEAM: PJ8972D48J
        TEST_TARGET_NAME: VitaAI
        GENERATE_INFOPLIST_FILE: YES
